  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Page</title>
<link rel="stylesheet" href="mobil.css">
</head>
<body>

<div class="product-page">

    <!-- Left Side -->
    <div class="image-section">
        <div class="thumbnails">
            <img src="phone.jpg" alt="">
            <img src="phone.jpg" alt="">
            <img src="phone.jpg" alt="">
            <img src="phone.jpg" alt="">
        </div>

        <div class="main-image">
            <img src="phone.jpg" alt="Phone">
        </div>
    </div>

    <!-- Center -->
    <div class="details-section">

        <h1>
            oppo 5G (Titan Black, 6GB RAM, 128GB Storage)
        </h1>

        <a href="#">Visit the oppo Store</a>

        <div class="rating">
            ★★★★☆ 4.2 (1006)
        </div>

        <div class="price-box">
            <span class="discount">-21%</span>
            <span class="price">₹22,999</span>
        </div>

        <p>M.R.P. <del>₹28,999</del></p>

        <p>Inclusive of all taxes</p>

        <h3>Offers</h3>

        <div class="offers">
            <div class="offer">
                <h4>Bank Offer</h4>
                <p>Up to ₹2,000 discount</p>
            </div>

            <div class="offer">
                <h4>No Cost EMI</h4>
                <p>Interest savings available</p>
            </div>

            <div class="offer">
                <h4>Cashback</h4>
                <p>Amazon Pay cashback</p>
            </div>
        </div>

    </div>

    <!-- Right Side -->
    <div class="buy-box">

        <h2>₹22,999</h2>

        <p class="delivery">
            FREE Delivery Tomorrow
        </p>

        <p class="stock">
            In Stock
        </p>

        <button class="cart">
            Add to Cart
        </button>

        <button class="buy">
        <a href="./don.html">
            Buy Now</a>
        </button>

    </div>

</div>

</body>
</html>
